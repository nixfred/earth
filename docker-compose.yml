services:
  earth-time:
    image: nginx:alpine
    container_name: earth-time
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.earth-time.rule=Host(`time.nixfred.tech`)"
      - "traefik.http.routers.earth-time.entrypoints=websecure"
      - "traefik.http.routers.earth-time.tls=true"
      - "traefik.http.routers.earth-time.tls.certresolver=hostinger"
      - "traefik.http.services.earth-time.loadbalancer.server.port=80"
      - "homepage.group=Projects"
      - "homepage.name=Earth Time"
      - "homepage.icon=mdi-clock-outline"
      - "homepage.href=https://time.nixfred.tech"
      - "homepage.description=4.5 Billion Years in 24 Hours"
    networks:
      - traefik

networks:
  traefik:
    name: traefik
    external: true
